server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:h2:mem:zyra
    driver-class-name: org.h2.Driver
    username: sa
    password:
  application:
    name: zyra-trading

# ─────────────────────────────────────────────
# Binance Testnet Configuration
# Get your keys from: https://testnet.binance.vision
# ─────────────────────────────────────────────
binance:
  api:
    base-url: https://testnet.binance.vision
    recv-window: 5000            # Max allowed clock skew (ms)
    timeout:
      connect: 5000              # Connection timeout (ms)
      read: 10000                # Read timeout (ms)
  websocket:
    base-url: wss://stream.testnet.binance.vision/ws

# ─────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.zyra.trading: DEBUG
    reactor.netty.http.client: DEBUG   # Uncomment to log raw HTTP wire traffic
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
